<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetterReply</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  :root{
    --ink:#1c2430; --paper:#f7f8f9; --card:#ffffff; --line:#dde2e8;
    --accent:#0f6b54; --accent-soft:#e3f0ec; --muted:#66707d;
    --warn:#9a4b00; --mono:"Cascadia Code","Consolas",monospace;
  }
  body.dark{
    --ink:#e4e8ec; --paper:#181c21; --card:#22272e; --line:#39414b;
    --accent:#3dbf9a; --accent-soft:#1d3a32; --muted:#98a2ad;
    --warn:#ffb26b;
  }
  body.dark input, body.dark textarea, body.dark select{color:var(--ink);}
  body.dark button{color:var(--ink);}
  body.dark button.primary{color:#0e1512;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;font-size:13px;
       color:var(--ink);background:var(--paper);}
  header{display:flex;align-items:baseline;gap:8px;padding:12px 14px 10px;
         border-bottom:1px solid var(--line);background:var(--card);}
  header h1{margin:0;font-size:15px;font-weight:600;letter-spacing:.2px;}
  header .brand{font-family:var(--mono);font-size:10px;color:var(--muted);
                margin-left:auto;}
  main{padding:12px 14px 20px;}
  .hint{color:var(--muted);line-height:1.45;margin:0 0 12px;}
  button{font:inherit;cursor:pointer;border-radius:6px;border:1px solid var(--line);
         background:var(--card);padding:7px 12px;}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;
                 font-weight:600;width:100%;padding:10px;}
  button.primary:disabled{opacity:.55;cursor:default;}
  button.ghost{background:transparent;border:none;color:var(--accent);
               padding:4px 2px;font-size:12px;}
  .tabs{display:flex;gap:0;margin:0 0 -1px;}
  .tabs button{flex:1;border-radius:8px 8px 0 0;border:1px solid var(--line);
        border-bottom:none;background:var(--paper);color:var(--muted);
        padding:8px 4px;font-size:12px;}
  .tabs button.active{background:var(--card);color:var(--accent);font-weight:600;}
  .tabs button .tag{display:block;font-size:10px;font-weight:400;color:var(--muted);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:8px;
        margin:0 0 12px;overflow:hidden;}
  .card.tabbed{border-radius:0 0 8px 8px;}
  .card h3{margin:0;padding:9px 12px;font-size:12px;font-weight:600;
           background:var(--accent-soft);color:var(--accent);
           display:flex;align-items:center;}
  .card h3 .tag{margin-left:auto;font-weight:400;color:var(--muted);font-size:11px;}
  .card .body{padding:10px 12px;white-space:pre-wrap;line-height:1.5;
              max-height:260px;overflow-y:auto;}
  .card .actions{display:flex;gap:8px;padding:0 12px 12px;}
  .card .actions button{flex:1;}
  .status{font-size:12px;color:var(--muted);min-height:18px;margin:8px 0;}
  .status.err{color:var(--warn);}
  details{margin-top:16px;border-top:1px solid var(--line);padding-top:10px;}
  summary{cursor:pointer;font-weight:600;font-size:12px;color:var(--muted);
          user-select:none;}
  label{display:block;font-size:11px;color:var(--muted);margin:10px 0 3px;}
  input,textarea,select{width:100%;font:inherit;font-size:12px;padding:6px 8px;
       border:1px solid var(--line);border-radius:6px;background:var(--card);}
  textarea{resize:vertical;min-height:64px;font-family:inherit;}
  .row{display:flex;gap:8px;margin-top:10px;}
  .row button{flex:1;font-size:12px;}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--accent-soft);
        border-top-color:var(--accent);border-radius:50%;
        animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){.spin{animation:none}}
</style>
</head>
<body>
<header>
  <h1>BetterReply</h1>
  <span class="brand">caffware</span>
  <button id="theme" title="Toggle dark mode"
    style="border:none;background:none;font-size:14px;cursor:pointer;padding:0 0 0 8px;line-height:1">&#9789;</button>
</header>
<main>
  <button class="primary" id="go">Polish my draft</button>
  <div class="status" id="status"></div>

  <div id="results"></div>

  <details id="settings">
    <summary>Settings &amp; profile</summary>

    <label for="key">OpenAI API key (stored only on this machine)</label>
    <input type="password" id="key" placeholder="sk-...">

    <label for="model">Model</label>
    <select id="model">
      <option value="gpt-4o">gpt-4o</option>
      <option value="gpt-4o-mini">gpt-4o-mini</option>
    </select>

    <label for="sig">Signature marker (first line of your signature)</label>
    <input type="text" id="sig" placeholder="Connor Cafferty">

    <label for="rules">My style rules (travels with your profile)</label>
    <textarea id="rules"
      placeholder="e.g. Never use em-dashes. Keep replies under 5 sentences. Sign off with Best."></textarea>

    <label for="learn" style="margin-top:14px">Style memory</label>
    <select id="learn">
      <option value="on">On - keep my chosen replies 30 days as style reference</option>
      <option value="off">Off - polish message by message only</option>
    </select>
    <p class="hint" style="margin:6px 0 0">
      <span id="sampleCount"></span>
      <button class="ghost" id="clearSamples" type="button">Clear now</button>
    </p>

    <div class="row">
      <button id="save">Save settings</button>
      <button id="exportP">Export profile</button>
      <button id="importP">Import profile</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none">
  </details>
</main>

<script>
"use strict";
const $ = id => document.getElementById(id);
const LS = {
  key:  "br.apiKey",
  model:"br.model",
  sig:  "br.sigMarker",
  rules:"br.styleRules",
  samples:"br.styleSamples",   // recent chosen outputs (your words only)
  learn:  "br.learnStyle",
  theme:  "br.theme"
};
const SAMPLE_DAYS = 30, SAMPLE_MAX = 20, SAMPLE_USE = 4;

function loadSettings(){
  $("key").value   = localStorage.getItem(LS.key)   || "";
  $("model").value = localStorage.getItem(LS.model) || "gpt-4o";
  $("sig").value   = localStorage.getItem(LS.sig)   || "";
  $("rules").value = localStorage.getItem(LS.rules) || "";
  $("learn").value = localStorage.getItem(LS.learn) || "on";
  updateSampleCount();
}
function saveSettings(){
  localStorage.setItem(LS.key,   $("key").value.trim());
  localStorage.setItem(LS.model, $("model").value);
  localStorage.setItem(LS.sig,   $("sig").value.trim());
  localStorage.setItem(LS.rules, $("rules").value.trim());
  localStorage.setItem(LS.learn, $("learn").value);
  setStatus("Settings saved.");
}

/* ---------- portable profile (no API key inside) ---------- */
function exportProfile(){
  const profile = {
    caffware: "betterreply-profile",
    version: 1,
    model: $("model").value,
    sigMarker: $("sig").value.trim(),
    styleRules: $("rules").value.trim()
  };
  const blob = new Blob([JSON.stringify(profile, null, 2)],
                        {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "betterreply-profile.json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importProfile(file){
  const r = new FileReader();
  r.onload = () => {
    try{
      const p = JSON.parse(r.result);
      if(p.caffware !== "betterreply-profile") throw new Error("not a profile");
      if(p.model)      $("model").value = p.model;
      if(p.sigMarker !== undefined) $("sig").value = p.sigMarker;
      if(p.styleRules !== undefined) $("rules").value = p.styleRules;
      saveSettings();
      setStatus("Profile imported.");
    }catch(e){
      setStatus("That file isn't a BetterReply profile.", true);
    }
  };
  r.readAsText(file);
}

/* ---------- style memory (your words only, 30-day rolling) ---------- */
function loadSamples(){
  let arr = [];
  try{ arr = JSON.parse(localStorage.getItem(LS.samples) || "[]"); }catch(e){}
  const cutoff = Date.now() - SAMPLE_DAYS*24*60*60*1000;
  arr = arr.filter(s => s.ts > cutoff);
  localStorage.setItem(LS.samples, JSON.stringify(arr));
  return arr;
}
function addSample(text){
  if(localStorage.getItem(LS.learn) === "off") return;
  const arr = loadSamples();
  arr.push({ts: Date.now(), text: text.slice(0, 1200)});
  while(arr.length > SAMPLE_MAX) arr.shift();
  localStorage.setItem(LS.samples, JSON.stringify(arr));
  updateSampleCount();
}
function clearSamples(){
  localStorage.removeItem(LS.samples);
  updateSampleCount();
  setStatus("Style memory cleared.");
}
function updateSampleCount(){
  const n = loadSamples().length;
  const el = $("sampleCount");
  if(el) el.textContent = n
    ? n + " sample" + (n>1?"s":"") + " from the last " + SAMPLE_DAYS + " days"
    : "Nothing stored yet - your drafts are added automatically when you polish.";
}
function styleReference(){
  if(localStorage.getItem(LS.learn) === "off") return "";
  const arr = loadSamples();
  if(!arr.length) return "";
  const recent = arr.slice(-SAMPLE_USE)
    .map((s,i) => "Example " + (i+1) + ":\n" + s.text).join("\n---\n");
  return "Recent emails this writer sent, as style reference only - " +
         "match their voice, never reuse their content:\n" + recent + "\n\n";
}

/* ---------- status ---------- */
function setStatus(msg, isErr, spinning){
  const s = $("status");
  s.className = "status" + (isErr ? " err" : "");
  s.innerHTML = (spinning ? '<span class="spin"></span>' : "") + msg;
}

/* ---------- draft handling ---------- */
function cutPosition(text){
  const marks = [];
  const sig = (localStorage.getItem(LS.sig) || "").trim();
  if(sig){
    const p = text.toLowerCase().indexOf(sig.toLowerCase());
    if(p >= 0) marks.push(p);
  }
  for(const m of ["From: ", "-----Original Message-----"]){
    const p = text.indexOf(m);
    if(p >= 0) marks.push(p);
  }
  return marks.length ? Math.min(...marks) : text.length;
}

function getBodyText(){
  return new Promise((resolve, reject) => {
    Office.context.mailbox.item.body.getAsync(Office.CoercionType.Text, res => {
      if(res.status === Office.AsyncResultStatus.Succeeded) resolve(res.value);
      else reject(new Error(res.error ? res.error.message : "couldn't read draft"));
    });
  });
}

/* ---------- OpenAI ---------- */
async function polish(draft, threadContext){
  const key = localStorage.getItem(LS.key);
  if(!key) throw new Error("No API key set. Open Settings below and add one.");
  const rules = localStorage.getItem(LS.rules) || "";

  const sys =
    "You polish work emails. Fix typos, grammar, and awkward phrasing but " +
    "PRESERVE the writer's own words and structure - light editing only, no " +
    "rewrites, no added filler. Tone: simple, personable, professional. " +
    "If any signature block or footer slipped into the draft, leave it out " +
    "of your output entirely. The quoted thread, if provided, is context " +
    "ONLY - never rewrite, quote, or include it. " +
    (rules ? "The writer's standing style rules, follow them strictly: " + rules + " " : "") +
    styleReference() +
    "Return exactly two versions of the draft separated by the line " +
    "===OPTION2=== on its own line. Version 1: minimal cleanup. Version 2: " +
    "slightly more polished. Return ONLY the email text - no preamble, no " +
    "labels, no markdown, no subject line.";

  let user = "DRAFT TO POLISH:\n" + draft;
  if(threadContext)
    user += "\n\nTHREAD CONTEXT (do not rewrite or include):\n" +
            threadContext.slice(0, 6000);

  const resp = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + key
    },
    body: JSON.stringify({
      model: localStorage.getItem(LS.model) || "gpt-4o",
      max_tokens: 2000,
      messages: [
        {role: "system", content: sys},
        {role: "user",   content: user}
      ]
    })
  });
  if(!resp.ok){
    const t = await resp.text();
    throw new Error("API " + resp.status + ": " + t.slice(0, 300));
  }
  const data = await resp.json();
  const text = data.choices?.[0]?.message?.content || "";
  const parts = text.split("===OPTION2===");
  if(parts.length < 2) throw new Error("Couldn't parse two options from the response.");
  return [parts[0].trim(), parts[1].trim()];
}

/* ---------- results UI (tabbed) ---------- */
function showOptions(opt1, opt2, cutPos, fullText){
  const box = $("results");
  box.innerHTML = "";
  const defs = [
    {label:"Option 1", tag:"minimal cleanup", text:opt1},
    {label:"Option 2", tag:"more polished",   text:opt2}
  ];

  const tabs = document.createElement("div");
  tabs.className = "tabs";
  const card = document.createElement("div");
  card.className = "card tabbed";
  card.innerHTML =
    '<div class="body"></div>' +
    '<div class="actions">' +
      '<button class="use primary">Use this</button>' +
      '<button class="copy">Copy</button>' +
    '</div>';

  let current = 0;
  const tabBtns = defs.map((d, i) => {
    const b = document.createElement("button");
    b.type = "button";
    b.innerHTML = d.label + '<span class="tag">' + d.tag + '</span>';
    b.addEventListener("click", () => select(i));
    tabs.appendChild(b);
    return b;
  });

  function select(i){
    current = i;
    tabBtns.forEach((b, j) => b.classList.toggle("active", j === i));
    card.querySelector(".body").textContent = defs[i].text;
  }

  card.querySelector(".use").addEventListener("click",
    () => useOption(defs[current].text, cutPos, fullText));
  card.querySelector(".copy").addEventListener("click", async ev => {
    await navigator.clipboard.writeText(defs[current].text);
    ev.target.textContent = "Copied";
    setTimeout(() => ev.target.textContent = "Copy", 1200);
  });

  box.appendChild(tabs);
  box.appendChild(card);
  select(0);
}

function useOption(text, cutPos, fullText){
  // Replace only the written portion; keep signature + thread as-is.
  const preserved = fullText.slice(cutPos);
  const newBody = text + (preserved ? "\n\n" + preserved : "");
  Office.context.mailbox.item.body.setAsync(
    newBody, {coercionType: Office.CoercionType.Text}, res => {
      if(res.status === Office.AsyncResultStatus.Succeeded){
        addSample(text);
        setStatus("Swapped in. Review and send.");
        $("results").innerHTML = "";
      }else{
        setStatus("Couldn't write to the draft: " +
                  (res.error ? res.error.message : "unknown") +
                  " - use Copy instead.", true);
      }
    });
}

/* ---------- main flow ---------- */
async function run(){
  const btn = $("go");
  btn.disabled = true;
  $("results").innerHTML = "";
  try{
    setStatus("Reading draft\u2026", false, true);
    const full = await getBodyText();
    const cut = cutPosition(full);
    const draft = full.slice(0, cut).trim();
    if(draft.length < 5)
      throw new Error("Draft looks empty - write something first.");
    addSample(draft);  // your own words, captured automatically
    const thread = full.slice(cut);
    const threadStart = Math.max(thread.indexOf("From: "),
                                 thread.indexOf("-----Original Message-----"));
    const context = threadStart >= 0 ? thread.slice(threadStart) : "";

    setStatus("Polishing\u2026", false, true);
    const [o1, o2] = await polish(draft, context);
    setStatus("");
    showOptions(o1, o2, cut, full);
  }catch(e){
    setStatus(e.message, true);
  }finally{
    btn.disabled = false;
  }
}

/* ---------- boot ---------- */
function applyTheme(){
  const dark = localStorage.getItem(LS.theme) === "dark";
  document.body.classList.toggle("dark", dark);
  $("theme").innerHTML = dark ? "&#9788;" : "&#9789;";
}
function toggleTheme(){
  const dark = localStorage.getItem(LS.theme) === "dark";
  localStorage.setItem(LS.theme, dark ? "light" : "dark");
  applyTheme();
}

Office.onReady(() => {
  loadSettings();
  applyTheme();
  $("theme").addEventListener("click", toggleTheme);
  if(!localStorage.getItem(LS.key)) $("settings").open = true;
  $("go").addEventListener("click", run);
  $("save").addEventListener("click", saveSettings);
  $("exportP").addEventListener("click", exportProfile);
  $("importP").addEventListener("click", () => $("importFile").click());
  $("importFile").addEventListener("change",
    ev => ev.target.files[0] && importProfile(ev.target.files[0]));
  $("clearSamples").addEventListener("click", clearSamples);
});
</script>
</body>
</html>
